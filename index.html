<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoResus ECOE PRO - Alta Fidelidad</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .monitor-font { font-family: 'JetBrains Mono', monospace; }
        
        .pulse-red { animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Animación de Ondas Monitor */
        .wave {
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            animation: wave-move 3s linear infinite;
        }
        @keyframes wave-move {
            0% { stroke-dashoffset: 200; }
            100% { stroke-dashoffset: 0; }
        }

        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; }
        input[type=range]::-webkit-slider-runnable-track { height: 6px; background: #1e293b; border-radius: 10px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #3b82f6; cursor: pointer; margin-top: -6px; border: 2px solid #fff; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CONSTANTES ---
        const SPO2_GOALS = [
            { min: 1, range: "60-65%" }, { min: 2, range: "65-70%" }, { min: 3, range: "70-75%" },
            { min: 4, range: "75-80%" }, { min: 5, range: "80-85%" }, { min: 10, range: "85-95%" }
        ];

        const EQUIPMENT_CART = [
            { category: "Cajón 1: Calor", items: [
                { id: 'cuna', name: 'Cuna Radiante' }, { id: 'bolsa_poli', name: 'Bolsa Polietileno' },
                { id: 'gorro', name: 'Gorro Lana' }, { id: 'colchon', name: 'Colchón Térmico' }
            ]},
            { category: "Cajón 2: VPP", items: [
                { id: 'neopuff', name: 'NeoPuff' }, { id: 'ambu', name: 'Bolsa Autoinflable' },
                { id: 'mascara_0', name: 'Máscara #0' }, { id: 'mascara_1', name: 'Máscara #1' }
            ]},
            { category: "Cajón 3: Vía Aérea", items: [
                { id: 'laringo', name: 'Laringoscopio' }, { id: 'ml', name: 'M. Laríngea #1' },
                { id: 'tubo_20', name: 'Tubo ET 2.0' }, { id: 'tubo_25', name: 'Tubo ET 2.5' },
                { id: 'tubo_30', name: 'Tubo ET 3.0' }, { id: 'tubo_35', name: 'Tubo ET 3.5' }
            ]},
            { category: "Cajón 4: Fármacos", items: [
                { id: 'surfactante', name: 'Surfactante' }, { id: 'adrenalina', name: 'Adrenalina 1:10k' },
                { id: 'sf', name: 'Suero Fisiológico' }
            ]},
            { category: "Monitoreo", items: [
                { id: 'steto', name: 'Estetoscopio' }, { id: 'spo2_sensor', name: 'Saturómetro' },
                { id: 'term_rectal', name: 'Termómetro Rectal' }
            ]}
        ];

        const CASES = [
            { 
                id: 1, title: "Prematuro Extremo", 
                vignette: "27 semanas. Sin corticoides. Expulsivo inminente.",
                eg: 27, liq: "Claro", hr: 75, spo2: 45, tone: "Flácido", cry: "Apnea", surfactant: true, tube: "2.5"
            },
            { 
                id: 2, title: "Líquido Meconial", 
                vignette: "41 semanas. Meconio espeso. Bradicardia fetal.",
                eg: 41, liq: "Meconial", hr: 50, spo2: 35, tone: "Pobre", cry: "Jadeo", surfactant: false, tube: "3.5"
            }
        ];

        function App() {
            const [view, setView] = useState('menu');
            const [currentCase, setCurrentCase] = useState(null);
            const [timer, setTimer] = useState(0);
            const [vitals, setVitals] = useState({ hr: 0, spo2: 0 });
            const [health, setHealth] = useState(100);
            const [logs, setLogs] = useState([]);
            
            // Reanimación State
            const [selectedEquip, setSelectedEquip] = useState([]);
            const [askedBriefing, setAskedBriefing] = useState([]);
            const [askedBirth, setAskedBirth] = useState([]);
            const [mode, setMode] = useState('neopuff');
            const [pip, setPip] = useState(20);
            const [fio2, setFio2] = useState(21);
            const [flow, setFlow] = useState(10);
            const [isVPPActive, setIsVPPActive] = useState(false);
            const [isVPPEffective, setIsVPPEffective] = useState(false);
            const [modal, setModal] = useState(null);

            const timerRef = useRef(null);

            const addLog = (m, status = 'info') => {
                const icons = { info: '🔹', correct: '✅', error: '❌', alert: '🔔', late: '⏰' };
                setLogs(prev => [{ t: formatTime(timer), m, icon: icons[status], status }, ...prev]);
            };

            const formatTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

            // --- LÓGICA DE SIMULACIÓN ---
            useEffect(() => {
                if (view === 'resus') {
                    timerRef.current = setInterval(() => {
                        setTimer(t => {
                            const nt = t + 1;
                            if (nt === 30) addLog("[!] EVALUACIÓN 30s.", "alert");
                            if (nt === 60) {
                                addLog("[!] MINUTO DE ORO.", "alert");
                                if (vitals.hr < 100 && !isVPPActive) addLog("A los 60s no has iniciado VPP.", "late");
                            }
                            return nt;
                        });
                        
                        // Fisiología dinámica
                        setVitals(v => {
                            let hrMod = (isVPPActive && isVPPEffective && flow >= 10) ? 1.8 : -1.2;
                            if (mode === 'freeflow') hrMod = -0.1;
                            
                            const newHr = Math.max(0, Math.min(160, v.hr + hrMod));
                            const newSpo2 = Math.max(0, Math.min(98, v.spo2 + (hrMod > 0 ? 0.6 : -0.4)));

                            if (newHr === 0) setView('end_fail');
                            if (newHr > 120 && newSpo2 > 90 && timer > 120) setView('end_success');

                            return { hr: Math.floor(newHr), spo2: Math.floor(newSpo2) };
                        });
                    }, 1000);
                } else clearInterval(timerRef.current);
                return () => clearInterval(timerRef.current);
            }, [view, isVPPActive, isVPPEffective, flow]);

            const startSession = () => {
                const c = CASES[Math.floor(Math.random() * CASES.length)];
                setCurrentCase(c);
                setView('vignette');
                setVitals({ hr: c.hr, spo2: c.spo2 });
                setLogs([]);
                setTimer(0);
                setHealth(100);
            };

            // --- COMPONENTES ---

            const Monitor = () => (
                <div className={`bg-black border-4 rounded-[2.5rem] p-6 mb-6 shadow-2xl relative transition-colors ${timer >= 60 && vitals.hr < 100 ? 'border-rose-600 pulse-red' : 'border-slate-800'}`}>
                    <div className="flex justify-between items-center mb-6">
                        <span className="text-[10px] font-black text-slate-600 uppercase">AHA 2026 MONITOR</span>
                        <span className="text-amber-500 font-bold monitor-font text-lg">{formatTime(timer)}</span>
                    </div>
                    <div className="grid grid-cols-2 gap-8">
                        <div>
                            <span className="text-[10px] font-bold text-emerald-500 uppercase">FC (BPM)</span>
                            <div className="text-7xl font-black monitor-font text-emerald-400">{vitals.hr || '--'}</div>
                            <svg width="100%" height="30" className="mt-2 opacity-40">
                                <path d="M0,15 L10,15 L15,5 L20,25 L25,15 L40,15" className="wave" stroke="#10b981" strokeDasharray="200" />
                            </svg>
                        </div>
                        <div className="text-right">
                            <span className="text-[10px] font-bold text-sky-500 uppercase">SpO2 (%)</span>
                            <div className="text-7xl font-black monitor-font text-sky-400">{vitals.spo2 || '--'}</div>
                            <svg width="100%" height="30" className="mt-2 opacity-40">
                                <path d="M0,15 Q20,5 40,15 T80,15" className="wave" stroke="#38bdf8" strokeDasharray="200" />
                            </svg>
                        </div>
                    </div>
                </div>
            );

            const Manometer = ({ active, value }) => (
                <div className="flex flex-col items-center justify-center p-4 bg-slate-900 border border-slate-800 rounded-3xl w-32 h-32 relative shadow-inner">
                    <div className="w-24 h-24 border-4 border-slate-700 rounded-full flex items-center justify-center bg-slate-950 relative">
                        <div className="absolute w-1 h-10 bg-blue-500 origin-bottom transition-transform duration-150" 
                             style={{ transform: `rotate(${active ? (value * 6 - 90) : -90}deg)`, bottom: '50%' }}></div>
                        <div className="w-1.5 h-1.5 bg-white rounded-full z-10"></div>
                        <div className="absolute top-1 text-[7px] font-bold text-slate-500">40</div>
                        <div className="absolute right-1 text-[7px] font-bold text-slate-500">20</div>
                    </div>
                    <span className="text-[7px] font-black text-slate-500 mt-2 uppercase">PIP cmH2O</span>
                </div>
            );

            // --- VISTAS ---

            if (view === 'menu') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8 text-center">
                    <div className="bg-blue-600 p-8 rounded-[3rem] shadow-2xl mb-8 scale-110">
                        <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                    </div>
                    <h1 className="text-4xl font-black mb-4 uppercase tracking-tighter">NeoResus ULTRA</h1>
                    <p className="text-slate-500 mb-12 italic max-w-xs">Simulador de Alta Fidelidad para Preparación ECOE</p>
                    <button onClick={startSession} className="bg-blue-600 hover:bg-blue-500 py-6 px-20 rounded-[2rem] font-black uppercase tracking-widest shadow-xl transition-all active:scale-95">Comenzar Guardia</button>
                </div>
            );

            if (view === 'vignette') return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950">
                    <div className="bg-slate-900 p-12 rounded-[4rem] border border-slate-800 max-w-xl w-full shadow-2xl">
                        <span className="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-6 block">Caso Clínico</span>
                        <h2 className="text-3xl font-bold mb-6 leading-tight text-white">{currentCase.title}</h2>
                        <p className="text-slate-300 text-lg leading-relaxed mb-12 italic border-l-4 border-blue-600 pl-6">"{currentCase.vignette}"</p>
                        <button onClick={() => setView('briefing')} className="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase tracking-widest">Realizar Briefing</button>
                    </div>
                </div>
            );

            if (view === 'briefing') return (
                <div className="min-h-screen p-6 max-w-xl mx-auto flex flex-col justify-center">
                    <h2 className="text-2xl font-black text-center mb-8 uppercase text-blue-400">1. Interrogatorio a Obstetricia</h2>
                    <div className="grid gap-3">
                        {[
                            { id:'eg', q:'¿Cuál es la Edad Gestacional?', a:currentCase.eg + ' semanas' },
                            { id:'liq', q:'¿Líquido Amniótico?', a:currentCase.liq },
                            { id:'riesgo', q:'¿Factores de Riesgo?', a:currentCase.risk },
                            { id:'cord', q:'¿Manejo del Cordón?', a:'Plan de clampeo diferido.' }
                        ].map(it => (
                            <button key={it.id} onClick={() => !askedBriefing.includes(it.id) && setAskedBriefing(p => [...p, it.id])} className={`p-6 rounded-[2rem] border-2 text-left relative overflow-hidden transition-all ${askedBriefing.includes(it.id) ? 'border-blue-500 bg-blue-500/10' : 'border-slate-800 bg-slate-900'}`}>
                                <p className="text-[10px] font-black text-blue-400 uppercase mb-1">{it.q}</p>
                                <p className={`font-bold transition-all text-white ${askedBriefing.includes(it.id) ? 'opacity-100' : 'opacity-0'}`}>{it.a}</p>
                                {!askedBriefing.includes(it.id) && <div className="absolute inset-0 flex items-center justify-center bg-slate-900/80 backdrop-blur-sm text-[10px] font-black text-slate-500">PREGUNTAR</div>}
                            </button>
                        ))}
                    </div>
                    <button disabled={askedBriefing.length < 4} onClick={() => setView('prep')} className="w-full mt-10 bg-white text-black font-black py-5 rounded-3xl disabled:opacity-20 uppercase shadow-xl">Revisar Carro de Paro</button>
                </div>
            );

            if (view === 'prep') return (
                <div className="min-h-screen p-6 max-w-3xl mx-auto pb-48">
                    <h2 className="text-2xl font-black text-center mb-8 uppercase text-blue-400 tracking-tighter">2. Preparación de Material</h2>
                    {EQUIPMENT_CART.map((cat, ci) => (
                        <div key={ci} className="mb-8">
                            <h3 className="text-[10px] font-black text-slate-500 uppercase mb-4 tracking-widest px-2 border-l-4 border-blue-600">{cat.category}</h3>
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                {cat.items.map(it => {
                                    const sel = selectedEquip.includes(it.id);
                                    return (
                                        <button key={it.id} onClick={() => setSelectedEquip(p => sel ? p.filter(x => x !== it.id) : [...p, it.id])} className={`p-4 rounded-2xl border-2 transition-all flex flex-col items-center justify-center gap-2 ${sel ? 'border-emerald-500 bg-emerald-500/10 text-white' : 'border-slate-800 bg-slate-900 text-slate-600'}`}>
                                            <span className="text-[9px] font-black uppercase text-center leading-tight">{it.name}</span>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    ))}
                    <div className="fixed bottom-0 left-0 right-0 p-8 bg-slate-900 border-t border-slate-800 max-w-3xl mx-auto rounded-t-[3rem] z-50">
                        <button onClick={() => setView('birth')} className="w-full bg-emerald-600 py-5 rounded-[2rem] font-black uppercase shadow-xl tracking-widest">Atender Parto</button>
                    </div>
                </div>
            );

            if (view === 'birth') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6">
                    <h2 className="text-3xl font-black mb-10 uppercase tracking-widest text-amber-500">3. Evaluación Inicial</h2>
                    <div className="grid gap-3 w-full max-w-md">
                        {[
                            { id: 't', q: "¿Es de Término?", a: currentCase.eg >= 37 ? "Sí" : "No" },
                            { id: 'to', q: "¿Buen Tono?", a: currentCase.tone },
                            { id: 'r', q: "¿Respira o Llora?", a: currentCase.cry }
                        ].map(it => (
                            <button key={it.id} onClick={() => !askedBirth.includes(it.id) && setAskedBirth(p => [...p, it.id])} className={`p-10 rounded-[3rem] border-2 transition-all relative overflow-hidden ${askedBirth.includes(it.id) ? 'border-amber-600 bg-amber-600/10 text-white shadow-xl' : 'border-slate-800 bg-slate-900'}`}>
                                <p className="text-[10px] font-black text-amber-500 uppercase mb-2">{it.q}</p>
                                <p className={`text-2xl font-black transition-all ${askedBirth.includes(it.id) ? 'opacity-100' : 'opacity-0'}`}>{it.a}</p>
                                {!askedBirth.includes(it.id) && <div className="absolute inset-0 flex items-center justify-center bg-slate-900/80 backdrop-blur-sm text-[10px] font-black text-slate-500">EVALUAR</div>}
                            </button>
                        ))}
                    </div>
                    <button disabled={askedBirth.length < 3} onClick={() => setView('resus')} className="mt-12 bg-rose-600 py-5 px-20 rounded-3xl font-black uppercase tracking-widest animate-pulse shadow-2xl">Actuar</button>
                </div>
            );

            if (view === 'resus') return (
                <div className="min-h-screen p-4 pb-64">
                    <Monitor />

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-8">
                        {/* Configuración Técnica */}
                        <div className="bg-slate-900 p-6 rounded-[2.5rem] border border-slate-800 space-y-6">
                            <div className="flex justify-between items-center">
                                <span className="text-[10px] font-black text-blue-400 uppercase tracking-widest">Dispositivo</span>
                                <div className="flex gap-1">
                                    {['neopuff', 'ambu', 'freeflow'].map(m => (
                                        <button key={m} onClick={() => setMode(m)} className={`px-2 py-1 rounded text-[8px] font-black uppercase ${mode === m ? 'bg-blue-600' : 'bg-slate-800 text-slate-500'}`}>{m}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="space-y-4">
                                <div><div className="flex justify-between text-[10px] font-bold text-slate-500 mb-1"><span>PIP (cmH2O)</span><span className="text-blue-400">{pip}</span></div><input type="range" min="15" max="40" value={pip} onChange={(e)=>setPip(parseInt(e.target.value))}/></div>
                                <div><div className="flex justify-between text-[10px] font-bold text-slate-500 mb-1"><span>FiO2 (%)</span><span className="text-sky-400">{fio2}%</span></div><input type="range" min="21" max="100" value={fio2} onChange={(e)=>setFio2(parseInt(e.target.value))}/></div>
                                <div><div className="flex justify-between text-[10px] font-bold text-slate-500 mb-1"><span>Flujo (L/min)</span><span className={flow < 10 ? 'text-rose-500' : 'text-emerald-500'}>{flow} L</span></div><input type="range" min="0" max="15" value={flow} onChange={(e)=>setFlow(parseInt(e.target.value))}/></div>
                            </div>
                        </div>

                        {/* Botones de Pasos */}
                        <div className="grid grid-cols-2 gap-2">
                            {['Secar', 'Calor', 'Posición', 'Aspirar'].map(ac => (
                                <button key={ac} onClick={() => addLog(`Paso: ${ac}`, 'correct')} className="bg-slate-800 p-4 rounded-3xl text-[9px] font-black uppercase border border-slate-700">RN: {ac}</button>
                            ))}
                            <button onClick={() => setModal('mrsopa')} className="bg-amber-600/20 border border-amber-600 text-amber-500 font-black p-5 rounded-3xl text-[10px] uppercase col-span-1 shadow-lg">MR. SOPA</button>
                            <button onClick={() => setModal('advanced')} className="bg-slate-900 border border-slate-700 text-white font-black p-5 rounded-3xl text-[10px] uppercase col-span-1 shadow-lg">Vía Aérea Avanzada</button>
                        </div>
                    </div>

                    <div className="flex flex-col md:flex-row items-center justify-around gap-10">
                        {/* Botón de Ventilación */}
                        <div className="relative group">
                            <div className={`absolute -top-10 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-4 py-1 rounded-full text-[10px] font-black transition-opacity ${isVPPActive ? 'opacity-100' : 'opacity-0'}`}>VENTILA</div>
                            {mode !== 'freeflow' ? (
                                <button onMouseDown={() => { setIsVPPActive(true); addLog("VPP en curso.", "correct"); }} onMouseUp={() => setIsVPPActive(false)} className={`w-36 h-36 rounded-full border-8 transition-all flex items-center justify-center ${isVPPActive ? 'bg-blue-600 scale-95 border-white' : 'bg-slate-900 border-blue-600 shadow-2xl shadow-blue-500/30'}`}>
                                    <svg className={`w-12 h-12 ${isVPPActive ? 'text-white' : 'text-blue-500'}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 2v20M2 12h20"/><circle cx="12" cy="12" r="4"/></svg>
                                </button>
                            ) : (
                                <div className="w-36 h-36 rounded-full border-8 border-slate-800 bg-slate-900/50 flex items-center justify-center text-[10px] text-slate-600 font-black uppercase text-center p-6 italic">Administrando<br/>Flujo Libre</div>
                            )}
                        </div>

                        <Manometer active={isVPPActive} value={pip} />

                        <div className="flex flex-col gap-2 w-full max-w-xs">
                            <button onClick={() => addLog("Surfactante administrado.", "correct")} disabled={!selectedEquip.includes('surfactante')} className="bg-violet-700 py-4 rounded-2xl font-black text-xs uppercase shadow-xl disabled:opacity-30">Surfactante</button>
                            <button onClick={() => addLog("Adrenalina administrada.", "correct")} disabled={!selectedEquip.includes('adrenalina')} className="bg-rose-700 py-4 rounded-2xl font-black text-xs uppercase shadow-xl disabled:opacity-30">Adrenalina</button>
                        </div>
                    </div>

                    {/* Asistente & Log */}
                    <div className="fixed bottom-0 left-0 right-0 p-5 bg-slate-950 border-t border-slate-800 h-56 overflow-y-auto z-50">
                        <div className="flex justify-between items-center mb-4 border-b border-white/5 pb-2">
                            <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-2 underline">Asistente ECOE: Registro Protocolar</span>
                            <span className="text-[10px] font-bold text-blue-500 uppercase tracking-widest">Metas SpO2: {SPO2_GOALS[Math.floor(timer/60)]?.range || '---'}</span>
                        </div>
                        {logs.map((l, i) => (
                            <div key={i} className={`text-[11px] font-mono mb-2 flex gap-3 items-start py-2 px-3 rounded-xl border border-white/5 bg-white/5 ${l.status === 'alert' ? 'bg-amber-500/10 border-amber-500/30 animate-pulse' : ''}`}>
                                <span className="text-slate-600 shrink-0">[{l.t}]</span>
                                <span>{l.icon}</span>
                                <span className={l.status === 'error' ? 'text-rose-400' : l.status === 'alert' ? 'text-amber-400 font-bold' : 'text-slate-200'}>{l.m}</span>
                            </div>
                        ))}
                    </div>

                    {/* MODALES */}
                    {modal === 'mrsopa' && (
                        <div className="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-6 backdrop-blur-md">
                            <div className="bg-white rounded-[3rem] p-10 max-w-xl w-full shadow-2xl">
                                <h3 className="text-2xl font-black text-slate-900 mb-8 uppercase text-center">Correctivos: MR. SOPA</h3>
                                <div className="space-y-3">
                                    {[
                                        {id:'M', n:'Máscara', d:'Re-ajustar sello facial.', r:'Sello mejorado.'},
                                        {id:'R', n:'Reposición', d:'Posición de olfateo.', r:'Vía aérea alineada.'},
                                        {id:'S', n:'Succión', d:'Boca y luego nariz.', r:'Secreciones removidas.'},
                                        {id:'O', n:'Open', d:'Boca abierta.', r:'Apertura mandibular.'},
                                        {id:'P', n:'Presión', d:'Subir PIP gradualmente.', r:'Presión aumentada.'}
                                    ].map(it => (
                                        <button key={it.id} onClick={() => { setIsVPPEffective(true); addLog(`MR. SOPA: Paso ${it.id} - ${it.r}`, 'correct'); }} className="flex gap-4 items-center w-full p-4 rounded-3xl border-2 hover:bg-slate-100 transition-all border-slate-100">
                                            <span className="bg-amber-100 text-amber-600 w-12 h-12 rounded-2xl flex items-center justify-center font-black text-xl">{it.id}</span>
                                            <div className="text-left"><p className="text-sm font-bold text-slate-900">{it.n}</p><p className="text-[10px] text-slate-400">{it.d}</p></div>
                                        </button>
                                    ))}
                                </div>
                                <button onClick={() => setModal(null)} className="w-full mt-10 bg-slate-900 text-white py-5 rounded-3xl font-black uppercase tracking-widest">Re-evaluar VPP</button>
                            </div>
                        </div>
                    )}

                    {modal === 'advanced' && (
                        <div className="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-6">
                            <div className="bg-slate-900 p-10 rounded-[3rem] border border-slate-800 max-w-2xl w-full shadow-2xl">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-2xl font-black uppercase tracking-widest text-blue-400">Vía Aérea Avanzada</h3>
                                    <button onClick={()=>setModal(null)} className="text-rose-500 font-bold uppercase text-xs">Cerrar</button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="space-y-4">
                                        <p className="text-[10px] font-black text-blue-500 uppercase border-b border-blue-900 pb-2 tracking-widest">Opción A: Intubación ET</p>
                                        <button disabled={!selectedEquip.includes('laringo')} onClick={() => addLog("Laringoscopio posicionado. Visualizo glotis.", "correct")} className="w-full p-4 bg-slate-800 rounded-2xl text-[10px] font-bold uppercase hover:bg-blue-600 disabled:opacity-30">1. Colocar Laringo</button>
                                        <button onClick={() => { setIsVPPEffective(true); addLog("Tubo ET insertado.", "correct"); }} className="w-full p-4 bg-slate-800 rounded-2xl text-[10px] font-bold uppercase hover:bg-blue-600">2. Insertar Tubo</button>
                                        <button onClick={() => addLog("Tubo fijado y verificado con murmullo.", "correct")} className="w-full p-4 bg-slate-800 rounded-2xl text-[10px] font-bold uppercase hover:bg-blue-600">3. Fijar Tubo</button>
                                    </div>
                                    <div className="space-y-4">
                                        <p className="text-[10px] font-black text-amber-500 uppercase border-b border-amber-900 pb-2 tracking-widest">Opción B: Máscara Laríngea</p>
                                        <button disabled={!selectedEquip.includes('ml')} onClick={() => addLog("Máscara Laríngea insertada en orofaringe.", "correct")} className="w-full p-4 bg-slate-800 rounded-2xl text-[10px] font-bold uppercase hover:bg-amber-600 disabled:opacity-30">1. Insertar ML</button>
                                        <button onClick={() => { setIsVPPEffective(true); addLog("Cuff inflado. Sello verificado.", "correct"); }} className="w-full p-4 bg-slate-800 rounded-2xl text-[10px] font-bold uppercase hover:bg-amber-600">2. Llenar Cuff / Sellar</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );

            if (view === 'end_fail') return (
                <div className="min-h-screen flex items-center justify-center p-8 text-center bg-slate-950">
                    <div className="bg-slate-900 p-12 rounded-[4rem] border-4 border-rose-600 max-w-lg w-full shadow-2xl">
                        <h2 className="text-4xl font-black mb-6 uppercase text-rose-500">Muerte Neonatal</h2>
                        <p className="text-slate-400 mb-10 leading-relaxed text-lg italic">"A pesar de las maniobras, el paciente no respondió. Revisa tus tiempos de VPP y el uso de MR. SOPA."</p>
                        <button onClick={() => setView('menu')} className="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase">Volver al Menú</button>
                    </div>
                </div>
            );

            if (view === 'end_success') return (
                <div className="min-h-screen flex items-center justify-center p-8 text-center bg-slate-950">
                    <div className="bg-slate-900 p-12 rounded-[4rem] border-4 border-emerald-600 max-w-lg w-full shadow-2xl">
                        <h2 className="text-4xl font-black mb-6 uppercase text-emerald-500">Estabilizado</h2>
                        <p className="text-slate-400 mb-10 leading-relaxed text-lg">"RN con FC > 120 y SpO2 en meta. Se decide traslado coordinado a UCIN."</p>
                        <button onClick={() => setView('menu')} className="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase">Volver al Menú</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
